<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</helmet>
<header style="position:sticky; top:0; z-index:1000; background:#0B1F33; border-bottom:1px solid rgba(164,206,78,0.18);">
  <div style="max-width:1240px; margin:0 auto; padding:0 24px; height:74px; display:flex; align-items:center; justify-content:space-between; gap:24px;">
    <a href="Inicio.dc.html" style="display:flex; align-items:center; gap:12px; text-decoration:none; flex-shrink:0;">
      <span style="width:44px; height:44px; border-radius:9px; background:#08182a; display:flex; align-items:center; justify-content:center; overflow:hidden; box-shadow:inset 0 0 0 1px rgba(174,182,191,0.18);">
        <img src="assets/shield.png" alt="PrevenCore" style="height:38px; width:auto; display:block;">
      </span>
      <span style="display:flex; flex-direction:column; line-height:1;">
        <span style="font-family:'Archivo',sans-serif; font-weight:800; font-size:20px; letter-spacing:0.02em; color:#FFFFFF;">PREVEN<span style="color:#A4CE4E;">CORE</span></span>
        <span style="font-family:'IBM Plex Mono',monospace; font-size:8.5px; letter-spacing:0.22em; color:#7C8B99; margin-top:5px;">ASESORÍAS EN PREVENCIÓN DE RIESGOS</span>
      </span>
    </a>

    <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
      <nav style="display:flex; align-items:center; gap:30px;">
        <sc-for list="{{ navLinks }}" as="item" hint-placeholder-count="6">
          <a href="{{ item.href }}" style="position:relative; display:flex; align-items:center; height:74px; color:{{ item.color }}; font-family:'IBM Plex Sans',sans-serif; font-weight:{{ item.weight }}; font-size:14.5px; text-decoration:none; letter-spacing:0.01em;" style-hover="color:#A4CE4E;">
            {{ item.label }}
            <span style="position:absolute; left:-2px; right:-2px; bottom:20px; height:2px; background:#A4CE4E; opacity:{{ item.barOpacity }};"></span>
          </a>
        </sc-for>
      </nav>
      <div style="display:flex; align-items:center; gap:12px; flex-shrink:0;">
        <a href="https://wa.me/56983100293" target="_blank" rel="noopener" style="display:flex; align-items:center; gap:8px; padding:0 16px; height:42px; border:1px solid rgba(164,206,78,0.45); border-radius:8px; color:#D7E6BD; font-family:'IBM Plex Sans',sans-serif; font-weight:600; font-size:14px; text-decoration:none;" style-hover="border-color:#A4CE4E; color:#A4CE4E;">
          <span style="width:8px; height:8px; border-radius:50%; background:#A4CE4E; box-shadow:0 0 8px #A4CE4E;"></span>
          WhatsApp
        </a>
        <a href="Contacto.dc.html" style="display:flex; align-items:center; padding:0 20px; height:42px; background:#A4CE4E; border-radius:8px; color:#0B1F33; font-family:'IBM Plex Sans',sans-serif; font-weight:700; font-size:14px; text-decoration:none;" style-hover="background:#B6DA66;">Solicitar asesoría</a>
      </div>
    </sc-if>

    <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
      <button onClick="{{ toggle }}" aria-label="Menú" style="display:flex; flex-direction:column; justify-content:center; gap:5px; width:46px; height:46px; padding:0 11px; background:transparent; border:1px solid rgba(174,182,191,0.3); border-radius:8px; cursor:pointer;">
        <span style="height:2px; background:#E8EEF3; border-radius:2px;"></span>
        <span style="height:2px; background:#E8EEF3; border-radius:2px;"></span>
        <span style="height:2px; background:#A4CE4E; border-radius:2px;"></span>
      </button>
    </sc-if>
  </div>

  <sc-if value="{{ showMobileMenu }}" hint-placeholder-val="{{ false }}">
    <div style="border-top:1px solid rgba(164,206,78,0.15); background:#0B1F33; padding:10px 24px 22px;">
      <nav style="display:flex; flex-direction:column;">
        <sc-for list="{{ navLinks }}" as="item" hint-placeholder-count="6">
          <a href="{{ item.href }}" style="display:flex; align-items:center; justify-content:space-between; padding:14px 4px; color:{{ item.color }}; font-family:'IBM Plex Sans',sans-serif; font-weight:{{ item.weight }}; font-size:16px; text-decoration:none; border-bottom:1px solid rgba(255,255,255,0.06);">
            {{ item.label }}
            <span style="width:7px; height:7px; border-radius:50%; background:#A4CE4E; opacity:{{ item.barOpacity }};"></span>
          </a>
        </sc-for>
      </nav>
      <div style="display:flex; gap:12px; margin-top:18px;">
        <a href="https://wa.me/56983100293" target="_blank" rel="noopener" style="flex:1; display:flex; align-items:center; justify-content:center; gap:8px; height:46px; border:1px solid rgba(164,206,78,0.45); border-radius:8px; color:#D7E6BD; font-family:'IBM Plex Sans',sans-serif; font-weight:600; font-size:15px; text-decoration:none;">WhatsApp</a>
        <a href="Contacto.dc.html" style="flex:1; display:flex; align-items:center; justify-content:center; height:46px; background:#A4CE4E; border-radius:8px; color:#0B1F33; font-family:'IBM Plex Sans',sans-serif; font-weight:700; font-size:15px; text-decoration:none;">Solicitar asesoría</a>
      </div>
    </div>
  </sc-if>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:74},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;inicio&quot;,&quot;nosotros&quot;,&quot;servicios&quot;,&quot;rubros&quot;,&quot;normativa&quot;,&quot;contacto&quot;],&quot;default&quot;:&quot;inicio&quot;}}">
class Component extends DCLogic {
  state = { w: (typeof window !== 'undefined' ? window.innerWidth : 1200), open: false };
  componentDidMount() {
    this._on = () => this.setState({ w: window.innerWidth });
    window.addEventListener('resize', this._on);
  }
  componentWillUnmount() {
    if (this._on) window.removeEventListener('resize', this._on);
  }
  renderVals() {
    const active = this.props.active || '';
    const items = [
      { label: 'Inicio', href: 'Inicio.dc.html', key: 'inicio' },
      { label: 'Nosotros', href: 'Nosotros.dc.html', key: 'nosotros' },
      { label: 'Servicios', href: 'Servicios.dc.html', key: 'servicios' },
      { label: 'Rubros', href: 'Rubros.dc.html', key: 'rubros' },
      { label: 'Normativa', href: 'Normativa.dc.html', key: 'normativa' },
      { label: 'Contacto', href: 'Contacto.dc.html', key: 'contacto' },
    ];
    const isMobile = this.state.w < 940;
    return {
      navLinks: items.map(it => ({
        ...it,
        color: it.key === active ? '#A4CE4E' : '#C9D4DE',
        weight: it.key === active ? '700' : '500',
        barOpacity: it.key === active ? 1 : 0,
      })),
      isMobile,
      isDesktop: !isMobile,
      showMobileMenu: isMobile && this.state.open,
      toggle: () => this.setState(s => ({ open: !s.open })),
    };
  }
}
</script>
</body>
</html>
